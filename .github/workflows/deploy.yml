name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-1
  PROJECT_NAME: fuel-dashboard

permissions:
  id-token: write
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Build & push Lambda images to ECR
  # ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Lambda)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push API Lambda image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/${{ env.PROJECT_NAME }}-api:$IMAGE_TAG -f Dockerfile .
          docker tag $ECR_REGISTRY/${{ env.PROJECT_NAME }}-api:$IMAGE_TAG $ECR_REGISTRY/${{ env.PROJECT_NAME }}-api:latest
          docker push $ECR_REGISTRY/${{ env.PROJECT_NAME }}-api:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ env.PROJECT_NAME }}-api:latest

      - name: Build & push Scraper Lambda image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/${{ env.PROJECT_NAME }}-scraper:$IMAGE_TAG -f Dockerfile.scraper .
          docker tag $ECR_REGISTRY/${{ env.PROJECT_NAME }}-scraper:$IMAGE_TAG $ECR_REGISTRY/${{ env.PROJECT_NAME }}-scraper:latest
          docker push $ECR_REGISTRY/${{ env.PROJECT_NAME }}-scraper:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ env.PROJECT_NAME }}-scraper:latest

      - name: Update Lambda functions
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.PROJECT_NAME }}-api \
            --image-uri $ECR_REGISTRY/${{ env.PROJECT_NAME }}-api:$IMAGE_TAG

          aws lambda update-function-code \
            --function-name ${{ env.PROJECT_NAME }}-scraper \
            --image-uri $ECR_REGISTRY/${{ env.PROJECT_NAME }}-scraper:$IMAGE_TAG

      - name: Wait for Lambda updates to complete
        run: |
          aws lambda wait function-updated-v2 --function-name ${{ env.PROJECT_NAME }}-api
          aws lambda wait function-updated-v2 --function-name ${{ env.PROJECT_NAME }}-scraper

  # ─────────────────────────────────────────────
  # Job 2: Build frontend & deploy to S3
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (S3 + CloudFront)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build static export
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ""
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3 (with cache headers)
        run: |
          aws s3 sync frontend/out/ s3://${{ secrets.S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"

          aws s3 sync frontend/out/ s3://${{ secrets.S3_BUCKET }}/ \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
