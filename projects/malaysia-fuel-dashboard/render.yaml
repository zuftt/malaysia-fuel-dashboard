services:
  - type: web
    name: malaysia-fuel-api
    runtime: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fuel-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://malaysia-fuel-dashboard.vercel.app,http://localhost:3000

  - type: web
    name: malaysia-fuel-dashboard
    runtime: node
    plan: free
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "cd frontend && npm start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://malaysia-fuel-api.onrender.com

databases:
  - name: fuel-db
    plan: free
    postgresVersion: "14"
